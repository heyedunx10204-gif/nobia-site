<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>プレスルーム | Nobia 学生アプリラボ</title>
<meta name="description" content="Nobia（学生アプリラボ）のプレスルーム。お知らせ・プレスリリース・メディア掲載情報を掲載しています。">
<meta property="og:title" content="プレスルーム | Nobia 学生アプリラボ">
<meta property="og:description" content="就活SNS「就トーク」と選考管理アプリ「シンプル就活」を開発するNobiaの最新情報をお届けします。">
<meta property="og:type" content="website">
<meta property="og:url" content="https://nobia-lab.com/press.html">
<meta property="og:image" content="https://nobia-lab.com/ogp.png">
<style>
  :root {
    --primary: #4f46e5;
    --primary-dark: #3730a3;
    --primary-light: #eef2ff;
    --ink: #1e1b2e;
    --ink-soft: #58596b;
    --line: #e6e6ef;
    --bg: #fafafa;
    --card: #ffffff;
    --tag-release: #4f46e5;
    --tag-news: #0ea5a4;
    --tag-media: #ea580c;
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Noto Sans JP", "Yu Gothic", Meiryo, sans-serif;
    color: var(--ink);
    background: var(--bg);
    line-height: 1.75;
  }
  a { color: inherit; text-decoration: none; }

  /* Header */
  header {
    position: sticky;
    top: 0;
    z-index: 20;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--line);
  }
  .nav-wrap {
    max-width: 1080px;
    margin: 0 auto;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 800;
    font-size: 1.05rem;
    letter-spacing: 0.02em;
  }
  .logo .mark {
    width: 28px; height: 28px;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--primary), #8b5cf6);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.85rem;
  }
  nav.links {
    display: flex;
    gap: 22px;
    font-size: 0.88rem;
    color: var(--ink-soft);
  }
  nav.links a:hover { color: var(--primary); }
  nav.links .current { color: var(--primary); font-weight: 700; }
  .back-home {
    font-size: 0.82rem;
    color: var(--primary);
    font-weight: 600;
    white-space: nowrap;
  }

  /* Hero */
  .hero {
    background: linear-gradient(160deg, var(--primary-light) 0%, #f5f3ff 60%, var(--bg) 100%);
    padding: 64px 24px 40px;
    text-align: center;
  }
  .hero .eyebrow {
    display: inline-block;
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--primary);
    background: #fff;
    border: 1px solid var(--line);
    padding: 5px 14px;
    border-radius: 999px;
    margin-bottom: 18px;
  }
  .hero h1 {
    font-size: clamp(1.8rem, 4vw, 2.5rem);
    margin: 0 0 14px;
    font-weight: 800;
  }
  .hero p {
    color: var(--ink-soft);
    max-width: 560px;
    margin: 0 auto;
    font-size: 0.98rem;
  }

  /* Main */
  main {
    max-width: 760px;
    margin: 0 auto;
    padding: 40px 24px 100px;
  }

  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 32px;
  }
  .filter-btn {
    border: 1px solid var(--line);
    background: #fff;
    color: var(--ink-soft);
    font-size: 0.85rem;
    font-weight: 600;
    padding: 8px 16px;
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .filter-btn:hover { border-color: var(--primary); color: var(--primary); }
  .filter-btn.active {
    background: var(--primary);
    border-color: var(--primary);
    color: #fff;
  }

  .news-list {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .news-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 24px 26px;
    transition: box-shadow 0.15s ease, transform 0.15s ease;
  }
  .news-card:hover {
    box-shadow: 0 8px 24px rgba(79,70,229,0.08);
    transform: translateY(-1px);
  }
  .news-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .news-date {
    font-size: 0.82rem;
    color: var(--ink-soft);
    font-variant-numeric: tabular-nums;
  }
  .tag {
    font-size: 0.72rem;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 999px;
    color: #fff;
  }
  .tag.tag-プレスリリース { background: var(--tag-release); }
  .tag.tag-お知らせ { background: var(--tag-news); }
  .tag.tag-メディア掲載 { background: var(--tag-media); }
  .news-card h2 {
    font-size: 1.08rem;
    margin: 0 0 8px;
    font-weight: 700;
  }
  .news-card .body {
    color: var(--ink-soft);
    font-size: 0.92rem;
    white-space: pre-line;
    margin: 0 0 12px;
  }
  .news-card .link-btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--primary);
  }
  .news-card .link-btn:hover { text-decoration: underline; }

  .empty-state {
    text-align: center;
    color: var(--ink-soft);
    font-size: 0.9rem;
    padding: 60px 0;
  }

  footer {
    border-top: 1px solid var(--line);
    padding: 32px 24px;
    text-align: center;
    color: var(--ink-soft);
    font-size: 0.8rem;
  }
  footer a { color: var(--primary); }

  @media (max-width: 640px) {
    nav.links { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="nav-wrap">
    <a class="logo" href="https://nobia-lab.com/">
      <span class="mark">N</span>
      Nobia
    </a>
    <nav class="links">
      <a href="https://nobia-lab.com/#apps">アプリ紹介</a>
      <a href="https://nobia-lab.com/#story">開発ストーリー</a>
      <a href="https://nobia-lab.com/#team">チーム</a>
      <a href="https://nobia-lab.com/#contact">お問い合わせ</a>
      <a class="current" href="press.html">プレスルーム</a>
    </nav>
    <a class="back-home" href="https://nobia-lab.com/">← トップへ戻る</a>
  </div>
</header>

<section class="hero">
  <span class="eyebrow">PRESS ROOM</span>
  <h1>プレスルーム</h1>
  <p>Nobia（学生アプリラボ）からのお知らせ・プレスリリース・メディア掲載情報をこちらで随時更新しています。</p>
</section>

<main>
  <div class="filters" id="filters"></div>
  <div class="news-list" id="news-list"></div>
  <div class="empty-state" id="empty-state" style="display:none;">該当するお知らせはまだありません。</div>
</main>

<footer>
  <p>取材・メディア掲載・パートナーシップ等のお問い合わせは <a href="mailto:nobia.lab.official@gmail.com">nobia.lab.official@gmail.com</a> までご連絡ください。</p>
  <p>© 2026 学生アプリラボ Nobia. All rights reserved.</p>
</footer>

<script src="news-data.js"></script>
<script>
(function () {
  const items = (typeof NEWS_ITEMS !== "undefined" ? NEWS_ITEMS.slice() : [])
    .filter(i => i && i.date && i.title)
    .sort((a, b) => new Date(b.date) - new Date(a.date));

  const categories = ["すべて", ...Array.from(new Set(items.map(i => i.category).filter(Boolean)))];
  let activeCategory = "すべて";

  const filtersEl = document.getElementById("filters");
  const listEl = document.getElementById("news-list");
  const emptyEl = document.getElementById("empty-state");

  function formatDate(dateStr) {
    const d = new Date(dateStr);
    if (isNaN(d)) return dateStr;
    return `${d.getFullYear()}.${String(d.getMonth() + 1).padStart(2, "0")}.${String(d.getDate()).padStart(2, "0")}`;
  }

  function renderFilters() {
    filtersEl.innerHTML = "";
    categories.forEach(cat => {
      const btn = document.createElement("button");
      btn.className = "filter-btn" + (cat === activeCategory ? " active" : "");
      btn.textContent = cat;
      btn.addEventListener("click", () => {
        activeCategory = cat;
        renderFilters();
        renderList();
      });
      filtersEl.appendChild(btn);
    });
  }

  function renderList() {
    const filtered = activeCategory === "すべて"
      ? items
      : items.filter(i => i.category === activeCategory);

    listEl.innerHTML = "";
    emptyEl.style.display = filtered.length === 0 ? "block" : "none";

    filtered.forEach(item => {
      const card = document.createElement("article");
      card.className = "news-card";

      const meta = document.createElement("div");
      meta.className = "news-meta";

      const date = document.createElement("span");
      date.className = "news-date";
      date.textContent = formatDate(item.date);
      meta.appendChild(date);

      if (item.category) {
        const tag = document.createElement("span");
        tag.className = "tag tag-" + item.category;
        tag.textContent = item.category;
        meta.appendChild(tag);
      }
      card.appendChild(meta);

      const h2 = document.createElement("h2");
      h2.textContent = item.title;
      card.appendChild(h2);

      if (item.body) {
        const body = document.createElement("p");
        body.className = "body";
        body.textContent = item.body;
        card.appendChild(body);
      }

      if (item.link) {
        const link = document.createElement("a");
        link.className = "link-btn";
        link.href = item.link;
        link.target = "_blank";
        link.rel = "noopener noreferrer";
        link.textContent = (item.linkLabel || "詳しく見る") + " ↗";
        card.appendChild(link);
      }

      listEl.appendChild(card);
    });
  }

  renderFilters();
  renderList();
})();
</script>

</body>
</html>
